---
server_url: $HEADSCALE_SERVER_URL
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
noise:
  private_key_path: /app/data/noise_private.key

prefixes:
  allocation: sequential
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

derp:
  server:
    enabled: true
    region_id: 999
    region_code: "custom"
    region_name: "HPC Lab Custom DERP"
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /app/data/derp_server_private.key
  urls: []
  paths: []
  auto_update_enabled: false
  update_frequency: 24h

# Disables the automatic check for headscale updates on startup
disable_check_updates: true

# Remove ephemeral nodes after being inactive
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /app/data/headscale.db

# TLS
tls_cert_path: ""
tls_key_path: ""

log:
  format: text
  level: info

policy:
  path: /etc/headscale/policy.json

dns:
  magic_dns: true
  base_domain: $HEADSCALE_BASE_DOMAIN
  nameservers:
    global:
      # Cloudflare DNS
      - 1.1.1.1
      - 2606:4700:4700::1111
      - 1.0.0.1
      - 2606:4700:4700::1001
